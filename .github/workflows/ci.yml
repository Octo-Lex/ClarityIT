name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Frontend: typecheck + tests + build ───
  frontend:
    name: Frontend (typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Typecheck (app)
        run: npm run typecheck:app

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Coverage
        run: npm run test:coverage

  # ─── Backend: Go tests ───
  # The suite hardcodes `postgres:5432` as the DB host in 37 *_test.go files,
  # expecting to run *inside* the Docker network where that alias resolves. So we
  # run go test inside a container on a user-defined network, mirroring the
  # project's Makefile `test` target — not on the runner host (where `postgres`
  # is unresolvable and `pg_isready -h localhost` would hang forever).
  #
  # NON-BLOCKING: the migration suite has pre-existing fresh-DB bugs (forward
  # references, duplicate table defs, incomplete permission renames, missing
  # role grants) documented in #1. This job runs to surface progress as those
  # are fixed but does not fail the workflow meanwhile.
  backend:
    name: Backend (Go) [non-blocking]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Create test network
        run: docker network create clarityit-net

      - name: Start Postgres
        run: |
          docker run -d --name postgres --network clarityit-net \
            --network-alias postgres \
            -e POSTGRES_USER=clarityit \
            -e POSTGRES_PASSWORD=clarityit \
            -e POSTGRES_DB=clarityit \
            -p 5432:5432 \
            postgres:16-alpine

      - name: Wait for Postgres (bounded)
        run: |
          for i in $(seq 1 30); do
            if docker exec postgres pg_isready -U clarityit >/dev/null 2>&1; then
              echo "Postgres ready"
              exit 0
            fi
            echo "waiting for Postgres ($i/30)..."
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          docker logs postgres
          exit 1

      - name: Apply migrations
        run: |
          for f in $(ls migrations/*.sql | sort); do
            echo "applying $f"
            docker exec -i postgres psql -U clarityit -d clarityit -v ON_ERROR_STOP=1 < "$f"
          done

      - name: Run Go tests (in-container, on the clarityit-net network)
        run: |
          docker run --rm \
            -v "$PWD/services/api:/app" \
            -w /app \
            --network clarityit-net \
            golang:1.25-alpine \
            go test -p 1 -count=1 -timeout 600s ./...

  # ─── Python worker ───
  worker:
    name: Worker (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/workers/reasoning
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Tests
        run: pytest -q
