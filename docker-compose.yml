# Core profile (default): API, web, workers, infrastructure
# Agent profile (optional): reasoning worker — requires WORKER_TOKEN
#   Enable with: docker compose --profile agent up -d

# Shared log rotation to prevent container logs from filling disk
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  clarityit-api:
    logging: *default-logging
    build:
      context: ./services/api
      dockerfile: Dockerfile
      args:
        BINARY: api
    container_name: clarityit-api
    restart: unless-stopped
    ports:
      - "8765:8765"
    environment:
      CLARITY_ENV: ${CLARITY_ENV:-development}
      DATABASE_URL: postgres://clarityit:clarityit@postgres:5432/clarityit?sslmode=disable
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: clarityit
      MINIO_ROOT_PASSWORD: clarityit123
      JWT_SECRET: ${JWT_SECRET:-}
      HMAC_KEY: ${HMAC_KEY:-}
      MFA_KEY: ${MFA_KEY:-}
      PROXMOX_ENABLED: ${PROXMOX_ENABLED:-false}
      PROXMOX_URL: ${PROXMOX_URL:-}
      PROXMOX_TOKEN_ID: ${PROXMOX_TOKEN_ID:-}
      PROXMOX_TOKEN_SECRET: ${PROXMOX_TOKEN_SECRET:-}
      PROXMOX_VERIFY_TLS: ${PROXMOX_VERIFY_TLS:-false}
      PROXMOX_MUTATION_ENABLED: ${PROXMOX_MUTATION_ENABLED:-false}
      APPROVAL_MONITOR_ENABLED: ${APPROVAL_MONITOR_ENABLED:-true}
      APPROVAL_MONITOR_INTERVAL_SECONDS: ${APPROVAL_MONITOR_INTERVAL_SECONDS:-60}
      APPROVAL_EXPIRING_THRESHOLD_PERCENT: ${APPROVAL_EXPIRING_THRESHOLD_PERCENT:-25}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      BACKUP_DIR: /var/lib/clarityit/backups
      PORT: "8765"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /opt/clarityit/backups:/var/lib/clarityit/backups:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - clarityit-net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  clarityit-outbox-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      args:
        BINARY: outbox-worker
    logging: *default-logging
    container_name: clarityit-outbox-worker
    restart: unless-stopped
    environment:
      CLARITY_ENV: ${CLARITY_ENV:-development}
      DATABASE_URL: postgres://clarityit:clarityit@postgres:5432/clarityit?sslmode=disable
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-}
      HMAC_KEY: ${HMAC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clarityit-net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  clarityit-context-worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      args:
        BINARY: context-worker
    logging: *default-logging
    container_name: clarityit-context-worker
    restart: unless-stopped
    environment:
      CLARITY_ENV: ${CLARITY_ENV:-development}
      DATABASE_URL: postgres://clarityit:clarityit@postgres:5432/clarityit?sslmode=disable
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-}
      HMAC_KEY: ${HMAC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clarityit-net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  clarityit-web:
    build:
      context: ./web
      dockerfile: Dockerfile
    logging: *default-logging
    container_name: clarityit-web
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      - clarityit-api
    networks:
      - clarityit-net
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    container_name: clarityit-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: clarityit
      POSTGRES_PASSWORD: clarityit
      POSTGRES_DB: clarityit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clarityit"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - clarityit-net

  nats:
    image: nats:2-alpine
    logging: *default-logging
    container_name: clarityit-nats-1
    restart: unless-stopped
    command: "--jetstream --store_dir /data"
    volumes:
      - natsdata:/data
    networks:
      - clarityit-net

  redis:
    image: redis:7-alpine
    logging: *default-logging
    container_name: clarityit-redis-1
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - clarityit-net

  clarityit-reasoning-worker:
    build:
      context: ./services/workers/reasoning
      dockerfile: Dockerfile
    logging: *default-logging
    container_name: clarityit-reasoning-worker
    restart: unless-stopped
    profiles: [agent]
    environment:
      API_BASE_URL: http://clarityit-api:8765
      WORKER_TOKEN: ${WORKER_TOKEN:-}
      POLL_INTERVAL: "5"
      TEAM_ID: ${TEAM_ID:-}
    depends_on:
      - clarityit-api
    networks:
      - clarityit-net
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio
    logging: *default-logging
    container_name: clarityit-minio-1
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: clarityit
      MINIO_ROOT_PASSWORD: clarityit123
    volumes:
      - miniodata:/data
    networks:
      - clarityit-net

volumes:
  pgdata:
  natsdata:
  redisdata:
  miniodata:

networks:
  clarityit-net:
    driver: bridge
